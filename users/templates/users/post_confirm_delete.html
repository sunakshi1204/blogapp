{% extends "blog/base.html" %}

{% block content %}
<div class=""content-section">
    <form method="post">
        {% csrf_token %}
        <fieldset class="form-group">
            
        <legend class ="border-botton mb-4">Delete Post</legend>
        <p>Are you sure you want to delete this post?"{{object.title}}"</p>
        </fieldset>
        <div class="form-group pt-3 pb-3">
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'post-detail' object.id %}" class="btn btn-secondary">Cancel</a>
        </div>


   
    </form>
</div>
{% endblock content %}
